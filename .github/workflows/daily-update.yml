name: Daily stat refresh

on:
  schedule:
    # 09:00 UTC daily — after the previous night's NBA/WNBA games are final.
    - cron: "0 9 * * *"
  workflow_dispatch: {}

jobs:
  update-current-season:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Refresh current-season stats and reload Postgres
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run python data/update_current_season.py
