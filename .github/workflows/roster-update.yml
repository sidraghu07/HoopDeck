name: Roster refresh

on:
  schedule:
    # Every 4 hours — real roster moves (trades/signings/waives) don't happen
    # faster than that; independent of the once-daily stats job so a hiccup
    # in one doesn't block the other.
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

jobs:
  update-team-rosters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Refresh NBA rosters
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LEAGUE: NBA
        run: uv run python data/update_team_rosters.py

      - name: Refresh WNBA rosters
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LEAGUE: WNBA
        run: uv run python data/update_team_rosters.py
